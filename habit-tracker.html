<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f2;
    --text: #1a1a1a;
    --dim: #888;
    --line: #ddd;
    --done: #1a1a1a;
    --skip: #ccc;
    --accent: #2d5a3d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .container { max-width: 680px; margin: 0 auto; }

  /* HEADER */
  .header { margin-bottom: 48px; }
  .date-line {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .subtitle {
    font-size: 12px;
    color: var(--dim);
    margin-top: 6px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
  }

  /* PROGRESS BAR */
  .progress-section { margin-bottom: 40px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 2px;
    background: var(--line);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  /* BLOCKS */
  .block { margin-bottom: 36px; }

  .block-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
  }

  .block-num {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.2em;
    min-width: 20px;
  }

  .block-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .block-time {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-left: auto;
  }

  /* HABIT ROWS */
  .habit {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 9px 0;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }

  .habit:hover { opacity: 0.7; }

  .check {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--dim);
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.15s;
    position: relative;
  }

  .habit.done .check {
    border-color: var(--accent);
    background: var(--accent);
  }

  .habit.done .check::after {
    content: '';
    position: absolute;
    left: 2px; top: 5px;
    width: 6px; height: 3px;
    border-left: 1.5px solid white;
    border-bottom: 1.5px solid white;
    transform: rotate(-45deg) translateY(-2px);
  }

  .habit-label {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    transition: color 0.15s;
  }

  .habit.done .habit-label {
    color: var(--dim);
    text-decoration: line-through;
    text-decoration-color: var(--skip);
  }

  .habit-note {
    font-size: 10px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--line);
    margin: 4px 0;
    opacity: 0.5;
  }

  /* NOTES */
  .notes-section { margin-top: 40px; }
  .notes-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .notes-area {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 2;
    padding: 4px 0;
    min-height: 80px;
  }
  .notes-area::placeholder { color: var(--line); }

  /* DATE NAV */
  .nav {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  .nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
    padding: 0;
    transition: color 0.15s;
  }
  .nav-btn:hover { color: var(--text); }

  /* STREAK */
  .streak-row {
    display: flex;
    gap: 5px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .streak-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
  }
  .streak-dot.active { background: var(--accent); }
  .streak-label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="nav">
      <button class="nav-btn" onclick="changeDay(-1)">← PREV</button>
      <button class="nav-btn" onclick="goToday()">TODAY</button>
      <button class="nav-btn" onclick="changeDay(1)">NEXT →</button>
    </div>
    <div class="date-line" id="dateLine"></div>
    <div class="title">Daily Log</div>
    <div class="subtitle">碎片化完成 · 每天积累</div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span>PROGRESS</span>
      <span id="progressText">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="streak-row" id="streakRow"></div>
    <div class="streak-label" id="streakLabel"></div>
  </div>

  <div id="habitsContainer"></div>

  <div class="notes-section">
    <div class="notes-label">TODAY'S NOTE</div>
    <textarea class="notes-area" id="notesArea" placeholder="今天的想法、卡点、收获..." rows="4"></textarea>
  </div>

</div>

<script>
const HABITS = [
  {
    id: 'bio',
    block: '01 · BIOLOGY',
    time: '30–45 min',
    items: [
      { id: 'bio_read', label: '读 Essential Cell Biology 课本', note: '做笔记，记概念框架' },
      { id: 'bio_note', label: '整理笔记到参考卡片', note: '关键词 + 一句话总结' },
    ]
  },
  {
    id: 'aav',
    block: '02 · AAV LITERATURE',
    time: '30–45 min',
    items: [
      { id: 'aav_read', label: '读 AAV 文章或 review', note: '重点：实验设计逻辑' },
      { id: 'aav_discuss', label: '与 Claude 打字讨论', note: '至少提出1个"why"问题' },
      { id: 'aav_present', label: '用 ChatGPT 口头 present', note: '用英语，不看笔记' },
    ]
  },
  {
    id: 'ai_theory',
    block: '03 · AI — 底层原理',
    time: '~20 min',
    items: [
      { id: 'ai_learn', label: '学习一个 AI/ML 概念', note: '线性代数 / 概率 / 神经网络结构' },
    ]
  },
  {
    id: 'ai_build',
    block: '04 · AI — 动手做产品',
    time: '~40 min',
    items: [
      { id: 'ai_build', label: '继续 app 项目 / 新功能', note: '每天1小时，累计推进' },
      { id: 'ai_prompt', label: '练习 Prompt Engineering', note: '记录1个有效 prompt 模式' },
    ]
  },
  {
    id: 'news',
    block: '05 · 财经 & 地缘',
    time: '20–30 min',
    items: [
      { id: 'news_read', label: '读财经/投资/地缘新闻', note: 'The Economist / FT / Bloomberg' },
      { id: 'news_note', label: '记录1个关键观点', note: '用自己话解释，不复制粘贴' },
    ]
  },
  {
    id: 'english',
    block: '06 · 英语输入',
    time: '~20 min',
    items: [
      { id: 'en_video', label: 'YouTube vlogger 跟读', note: '注意语调、连读、节奏' },
      { id: 'en_phrase', label: '记录1–2个地道表达', note: '用法 + 造句' },
    ]
  },
];

let currentDateKey = todayKey();
let allData = loadAll();

function todayKey() {
  return new Date().toISOString().split('T')[0];
}

function loadAll() {
  try { return JSON.parse(localStorage.getItem('habit_all') || '{}'); } catch { return {}; }
}

function saveAll() {
  localStorage.setItem('habit_all', JSON.stringify(allData));
}

function getDay(key) {
  if (!allData[key]) allData[key] = { checks: {}, note: '' };
  return allData[key];
}

function render() {
  const day = getDay(currentDateKey);
  const d = new Date(currentDateKey + 'T12:00:00');
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('dateLine').textContent =
    `${days[d.getDay()]} · ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

  const container = document.getElementById('habitsContainer');
  container.innerHTML = '';

  let total = 0, done = 0;

  HABITS.forEach(block => {
    const blockEl = document.createElement('div');
    blockEl.className = 'block';

    const header = document.createElement('div');
    header.className = 'block-header';
    header.innerHTML = `<span class="block-title">${block.block}</span><span class="block-time">${block.time}</span>`;
    blockEl.appendChild(header);

    block.items.forEach(item => {
      total++;
      const checked = !!day.checks[item.id];
      if (checked) done++;

      const row = document.createElement('div');
      row.className = 'habit' + (checked ? ' done' : '');
      row.innerHTML = `
        <div class="check"></div>
        <div>
          <div class="habit-label">${item.label}</div>
          <div class="habit-note">${item.note}</div>
        </div>
      `;
      row.onclick = () => {
        day.checks[item.id] = !day.checks[item.id];
        saveAll();
        render();
      };
      blockEl.appendChild(row);
    });

    container.appendChild(blockEl);
  });

  // progress
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = pct + '%';

  // notes
  document.getElementById('notesArea').value = day.note || '';

  // streak — last 14 days
  const streakRow = document.getElementById('streakRow');
  streakRow.innerHTML = '';
  let streak = 0;
  const today = todayKey();
  for (let i = 13; i >= 0; i--) {
    const d2 = new Date(); d2.setDate(d2.getDate() - i);
    const k = d2.toISOString().split('T')[0];
    const dayData = allData[k];
    let anyDone = dayData && Object.values(dayData.checks || {}).some(Boolean);
    const dot = document.createElement('div');
    dot.className = 'streak-dot' + (anyDone ? ' active' : '');
    streakRow.appendChild(dot);
    if (k <= today && anyDone) streak++;
    else if (k <= today) streak = 0;
  }
  document.getElementById('streakLabel').textContent = `${streak} day streak · last 14 days`;
}

document.getElementById('notesArea').addEventListener('input', e => {
  getDay(currentDateKey).note = e.target.value;
  saveAll();
});

function changeDay(n) {
  const d = new Date(currentDateKey + 'T12:00:00');
  d.setDate(d.getDate() + n);
  currentDateKey = d.toISOString().split('T')[0];
  render();
}

function goToday() {
  currentDateKey = todayKey();
  render();
}

render();
</script>
</body>
</html>
